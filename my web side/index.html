<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abubakar - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #ff5e62; 
            --secondary: #ff9966;
            --glass: rgba(255, 255, 255, 0.2);
            --white: #ffffff;
        }

        /* 1. Smooth Entry Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Using a deeper purple/blue for better glass contrast */
            /* Or stick to your orange: background: linear-gradient(135deg, #ff9966, #ff5e62); */
            background-attachment: fixed;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            color: var(--white);
        }

        /* 2. Glassmorphism Navigation */
        nav { 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { 
            font-weight: 700; 
            font-size: 1.8rem; 
            color: var(--white); 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { 
            text-decoration: none; 
            color: rgba(255, 255, 255, 0.8); 
            font-weight: 500; 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .nav-links a:hover, .active-link { 
            color: var(--white) !important; 
            transform: scale(1.1);
        }

        /* 3. Hero Section & Glass Card */
        .container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 40px; 
            animation: fadeInUp 1s ease-out;
        }

        .card { 
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 60px 40px; 
            border-radius: 30px; 
            text-align: center; 
            max-width: 600px; 
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        h2 { font-size: 2.5rem; margin-bottom: 20px; font-weight: 700; }
        p { font-size: 1.1rem; color: rgba(255, 255, 255, 0.9); line-height: 1.6; margin-bottom: 30px; }

        /* 4. Beautiful CTA Button */
        .btn-main {
            padding: 15px 40px;
            background: var(--white);
            color: #764ba2;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-main:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            background: var(--primary);
            color: white;
        }

        footer { 
            padding: 30px; 
            text-align: center; 
            background: rgba(0,0,0,0.1);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">abubakar</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active-link"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="aboutus.html"><i class="fas fa-user"></i> About Us</a></li>
            <li><a href="contactus.html"><i class="fas fa-envelope"></i> Contact Us</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Crafting Digital Experiences</h2>
            <p>Welcome to my portfolio. I specialize in building beautiful, responsive, and user-centric websites that stand out from the crowd.</p>
            <a href="aboutus.html" class="btn-main">Explore My Work</a>
        </div>
    </div>

    <footer>&copy; 2026 ABUBAKAR. DESIGNED WITH PASSION.</footer>

</body>
</html>
